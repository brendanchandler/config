# kitty.conf

# ============================================================
# General
# ============================================================

shell                   /usr/bin/fish
term                    xterm-256color
scrollback_lines        10000
copy_on_select          no
strip_trailing_spaces   smart
bell_on_tab             no
enable_audio_bell       no

# ============================================================
# Font — DejaVu Sans Mono
# ============================================================

font_family             DejaVu Sans Mono
font_size               9.0

# ============================================================
# One Dark color scheme
# ============================================================

background              #282c34
foreground              #abb2bf
cursor                  #528bff
cursor_text_color       #282c34

# Black / bright black
color0                  #282c34
color8                  #5c6370

# Red / bright red (errors, deletes)
color1                  #e06c75
color9                  #e06c75

# Green / bright green (strings, additions)
color2                  #98c379
color10                 #98c379

# Yellow / bright yellow (warnings, attributes)
color3                  #e5c07b
color11                 #e5c07b

# Blue / bright blue (functions, links)
color4                  #61afef
color12                 #61afef

# Magenta / bright magenta (keywords, constants)
color5                  #c678dd
color13                 #c678dd

# Cyan / bright cyan (types, special)
color6                  #56b6c2
color14                 #56b6c2

# White / bright white
color7                  #abb2bf
color15                 #ffffff
