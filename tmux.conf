set -g default-terminal "screen-256color"

set -g prefix 'C-\'
bind 'C-\' send-prefix
unbind C-b

set -g base-index 1
set -g mouse on
set -g default-shell "/usr/bin/fish"

set -s escape-time 1

set-option -g repeat-time 0
set-option -g history-limit 10000
set-option -g set-clipboard on

set-window-option -g mode-keys vi
setw -g pane-base-index 1

# Prefix Key Bindings
bind r source-file ~/.tmux.conf \; display "Reloaded tmux config!"
bind v run "xclip -o -sel clipboard | tmux load-buffer - && tmux paste-buffer"

bind -r M-k select-pane -U
bind -r M-j select-pane -D
bind -r M-h select-pane -L
bind -r M-l select-pane -R
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R

bind -r M-n next-window
bind -r M-p previous-window
bind -r o rotate-window

bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5

bind - split-window -h
bind | split-window -v
bind + select-layout -E
unbind E

bind g pipe-pane -o 'cat >>~/output.#I-$P'

# Global Keybinds

# Status Bar
set -g status-style fg='#d0d0d0',bg='#1c1c1c'
setw -g window-status-style fg='#808080',bg='#2a2a2a'
setw -g window-status-current-style fg='#ffffff',bg='#005f87'
setw -g pane-border-style fg='#444444',bg=default
setw -g pane-active-border-style fg='#005f87',bg=default

set -g status-right "#{?window_zoomed_flag,🔍, } | #[fg=white]%d %b %R"
set -g status-left-length 40
set -g status-left "#[fg=green]#S:  #[fg=yellow]#I #[fg=white]#P"
set -g status-interval 60
set -g status-justify centre

setw -g monitor-activity on
set -g visual-activity on


